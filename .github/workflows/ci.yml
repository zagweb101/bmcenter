name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PRD §28 — بوابات الجودة: اختبارات الخادم + بناء الواجهة على كل دفعة.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: core-api (Laravel tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core-api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: bayt_almoswer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_pgsql, pgsql, mbstring, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: services/core-api/vendor
          key: composer-${{ hashFiles('services/core-api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^# *DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^# *DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^# *DB_DATABASE=.*/DB_DATABASE=bayt_almoswer_test/' .env
          sed -i 's/^# *DB_USERNAME=.*/DB_USERNAME=postgres/' .env
          sed -i 's/^# *DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  frontend:
    name: core-admin (build + storybook)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build --workspace core-admin

      - name: Build Storybook
        run: npm run build-storybook --workspace core-admin
